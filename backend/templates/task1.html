<!doctype html>
<html lang="ru"><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Задача 1</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="wrap">
  <div class="card nav">
    <a href="/">Главная</a>
    <a href="/task1"><b>Задача 1</b></a>
    <a href="/task3">Задача 3</a>
  </div>

  <div class="card">
    <h2 style="margin:0;">Задача 1 — аудио → орфография + фонетика</h2>
  </div>

  <div class="card">
    <div class="small">Выбери аудио и нажми “Обработать”.</div>
    <input id="file" type="file" accept="audio/*">
    <div id="playerWrap" style="display:none;">
      <div class="small" style="margin-top:10px;">Прослушивание выбранного файла:</div>
      <audio id="player" controls></audio>
    </div>
    <div style="margin-top:10px;">
      <button id="go">Обработать</button>
      <span id="status" class="small" style="margin-left:10px;"></span>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0;">Орфографическая запись</h3>
    <div id="ortho"></div>
  </div>

  <div class="card">
    <h3 style="margin-top:0;">Фонетическая запись 1 (IPA, фонемы)</h3>
    <div id="phon1" class="mono"></div>

    <h3>Фонетическая запись 2 (русскими символами)</h3>
    <div id="phon2" class="mono"></div>

    <div id="note" class="small" style="margin-top:10px;"></div>
  </div>
</div>

<script>
const statusEl = document.getElementById('status');
const orthoEl = document.getElementById('ortho');
const phon1El = document.getElementById('phon1');
const phon2El = document.getElementById('phon2');
const noteEl = document.getElementById('note');

const fileInput = document.getElementById('file');
const playerWrap = document.getElementById('playerWrap');
const player = document.getElementById('player');

let objectUrl = null;
fileInput.addEventListener('change', () => {
  const f = fileInput.files && fileInput.files[0];
  if (!f) return;
  if (objectUrl) URL.revokeObjectURL(objectUrl);
  objectUrl = URL.createObjectURL(f);
  player.src = objectUrl;
  playerWrap.style.display = 'block';
});

document.getElementById('go').onclick = async () => {
  const f = fileInput.files && fileInput.files[0];
  if (!f) { alert('Выбери аудиофайл'); return; }

  statusEl.textContent = 'Обрабатываю...';
  orthoEl.textContent = '';
  phon1El.textContent = '';
  phon2El.textContent = '';
  noteEl.textContent = '';

  const fd = new FormData();
  fd.append('file', f);

  try {
    const r = await fetch('/api/process', { method:'POST', body: fd });
    const j = await r.json();

    if (!j.ok) {
      statusEl.textContent = 'Ошибка';
      alert('Ошибка: ' + (j.error || 'неизвестно') + (j.details ? ('\n\n' + j.details) : ''));
      return;
    }

    statusEl.textContent = 'Готово';
    orthoEl.textContent = j.orthography || '';
    phon1El.textContent = j.phonetics_ipa || '';
    phon2El.textContent = j.phonetics_rus || '';
    noteEl.textContent = j.note || '';
  } catch(e) {
    statusEl.textContent = 'Ошибка соединения';
    alert('Не удалось связаться с сервером.\n\n' + e);
  }
};
</script>
</body></html>
